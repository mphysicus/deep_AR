program: train.py
method: bayes
entity: deep_ar
project: lora_vit_b_new
metric:
  name: best_val_loss
  goal: minimize
# Hyperparameters
parameters:
  model_type:
    value: "vit_b" 
  train_input_dir:
    value: "/storage/prakhar/Sem_Project/data_files/realigned_merged_ivt/train_1"
  val_input_dir:
    value: "/storage/prakhar/Sem_Project/data_files/realigned_merged_ivt/validation"
  train_gt_dir:
    value: "/storage/prakhar/Sem_Project/data_files/pikart/train_1"
  val_gt_dir:
    value: "/storage/prakhar/Sem_Project/data_files/pikart/validation"
  train_method:
    value: "lora"
  lora_rank:
    values: [4, 8, 12, 16]
  lora_dropout:
    values: [0.05, 0.1, 0.2]
  epochs:
    value: 100
  early_stopping_patience:
    value: 10
  pretrained_lr:
    value: 1e-5
  scratch_lr:
    value: 1e-4
  warmup_steps:
    value: 300
  warmup_start_lr:
    value: 1e-6
  batch_size:
    value: 15
  gradient_accumulation_steps:
    values: [1, 4, 8, 12]
command:
  - accelerate
  - launch
  - --config_file
  - accelerate_config.yaml
  - ${program}
  - ${args}
  - --output_dir
  - /storage/prakhar/sweep_checkpoints/lora_vit_b_new
  - --trained_checkpoint
  - /storage/prakhar/Sem_Project/model/train/sweep_checkpoints/only_cnn_vit_b_new/dulcet_sweep_1/best_model.safetensors