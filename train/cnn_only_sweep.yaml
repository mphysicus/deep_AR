program: train.py
method: grid
entity: deep_ar
project: only_cnn_vit_b_sweep_new
metric:
  name: best_val_loss
  goal: minimize
# Hyperparameters
parameters:
  model_type:
    value: "vit_b" 
  original_sam_checkpoint:
    value: "/storage/prakhar/Sem_Project/weights/original_weights/sam_vit_b.pth"
  train_input_dir:
    value: "/storage/prakhar/Sem_Project/data_files/realigned_merged_ivt/train_1"
  val_input_dir:
    value: "/storage/prakhar/Sem_Project/data_files/realigned_merged_ivt/validation"
  train_gt_dir:
    value: "/storage/prakhar/Sem_Project/data_files/pikart/train_1"
  val_gt_dir:
    value: "/storage/prakhar/Sem_Project/data_files/pikart/validation"
  train_method:
    value: "only_cnn"
  epochs:
    value: 110
  early_stopping_patience:
    value: 10
  pretrained_lr:
    value: 1e-5
  scratch_lr:
    value: 1e-4
  warmup_steps:
    value: 250
  warmup_start_lr:
    value: 1e-6
  batch_size:
    value: 12
  gradient_accumulation_steps:
    values: [1, 5, 10]
command:
  - accelerate
  - launch
  - --config_file
  - accelerate_config.yaml
  - ${program}
  - ${args}
  - --output_dir
  - /storage/prakhar/Sem_Project/sweep_checkpoints/only_cnn_vit_b_new